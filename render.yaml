services:
  - type: web
    name: resume-reviewer
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn app:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20.11.0"
